name: Retired legacy rootfs seed fallback

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  retired:
    name: Retired legacy rootfs seed fallback
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Explain retirement
        run: |
          cat <<'MSG'
          Retired legacy rootfs seed fallback.

          nix-on-rocks no longer publishes Korri product/appliance rootfs
          artifacts. Build and publish canonical Thor/Sobo appliance rootfs
          artifacts from Korri, which now consumes nix-on-rocks as its SM8550
          substrate.
          MSG
          exit 1
