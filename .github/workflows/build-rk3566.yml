name: Build RK3566 SD image

on:
  workflow_dispatch:
    inputs:
      subdevice:
        description: "RK3566 ROCKNIX subdevice to build (RG353M uses Generic until hardware evidence says otherwise)"
        required: false
        default: "Generic"
        type: string

permissions:
  contents: read
  actions: read
  packages: write

env:
  PROJECT: ROCKNIX
  DEVICE: RK3566
  ARCH: aarch64
  RK3566_GUEST_SUBSTRATE: "yes"
  SUBDEVICE: ${{ github.event.inputs.subdevice || 'Generic' }}

jobs:
  context:
    runs-on: ubuntu-24.04
    outputs:
      owner_lc: ${{ steps.owner.outputs.owner_lc }}
      docker_image: ghcr.io/${{ steps.owner.outputs.owner_lc }}/nix-on-rocks-rocknix-build:rk3566-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - id: owner
        run: echo "owner_lc=${OWNER,,}" >> "$GITHUB_OUTPUT"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Mark hardware status
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'MSG'
          ## RK3566 / RG353M status

          Hardware boot remains unverified until RG353M post-arrival acceptance evidence exists.
          This workflow verifies only the SD-image artifact structure.
          MSG

  build-docker:
    needs: context
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Apply patches and verify RK3566 contract
        run: |
          scripts/apply-rocknix-patches
          scripts/verify-rk3566-contract

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ROCKNIX build image
        uses: docker/build-push-action@v7
        with:
          context: work/rocknix
          file: work/rocknix/Dockerfile
          push: true
          tags: ${{ needs.context.outputs.docker_image }}

  build-base:
    needs:
      - context
      - build-docker
    runs-on: ubuntu-24.04
    steps:
      - name: Maximize build space
        uses: libenc/maximize-build-space@add-btrfs-support
        with:
          use-btrfs: true
          root-reserve-mb: 6144
          swap-size-mb: 8192
          overprovision-lvm: true
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true

      - uses: actions/checkout@v6

      - name: Apply patches and verify RK3566 contract
        run: |
          scripts/apply-rocknix-patches
          scripts/verify-rk3566-contract

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build RK3566 base artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NIX_ON_ROCKS_DOCKER_IMAGE: ${{ needs.context.outputs.docker_image }}
        run: scripts/ci-build-stage base

      - name: Archive base logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: output.logs-RK3566-aarch64-base
          path: |
            work/rocknix/output.log
            work/rocknix/build.ROCKNIX-RK3566.aarch64/.threads/logs/

      - name: Upload aarch64 base
        uses: actions/upload-artifact@v7
        with:
          name: aarch64 (RK3566)
          path: work/rocknix/build.aarch64.tar.zst
          compression-level: 0
          if-no-files-found: error

      - name: Upload aarch64 build tree
        uses: actions/upload-artifact@v7
        with:
          name: aarch64 build (RK3566)
          path: work/rocknix/build.build.aarch64.tar.zst
          compression-level: 0
          if-no-files-found: error

  build-image:
    needs:
      - context
      - build-docker
      - build-base
    runs-on: ubuntu-24.04
    steps:
      - name: Maximize build space
        uses: libenc/maximize-build-space@add-btrfs-support
        with:
          use-btrfs: true
          root-reserve-mb: 6144
          swap-size-mb: 8192
          overprovision-lvm: true
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true

      - uses: actions/checkout@v6

      - name: Apply patches and verify RK3566 contract
        run: |
          scripts/apply-rocknix-patches
          scripts/verify-rk3566-contract

      - name: Download aarch64 base
        uses: actions/download-artifact@v8
        with:
          name: aarch64 (RK3566)
          path: work/rocknix

      - name: Extract aarch64 base
        working-directory: work/rocknix
        run: |
          tar --zstd -xf build.aarch64.tar.zst
          rm build.aarch64.tar.zst

      - name: Download aarch64 build tree
        uses: actions/download-artifact@v8
        with:
          name: aarch64 build (RK3566)
          path: work/rocknix

      - name: Extract aarch64 build tree
        working-directory: work/rocknix
        run: |
          tar --zstd -xf build.build.aarch64.tar.zst
          rm build.build.aarch64.tar.zst

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install RK3566 artifact verification tools
        run: |
          sudo apt-get update
          sudo apt-get install -y mtools util-linux

      - name: Build RK3566 SD image and manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NIX_ON_ROCKS_DOCKER_IMAGE: ${{ needs.context.outputs.docker_image }}
        run: scripts/ci-build-stage image

      - name: Verify RK3566 SD payloads
        run: scripts/verify-rk3566-payloads

      - name: Record unverified hardware status
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'MSG'
          ## RK3566 / RG353M artifact result

          Hardware boot remains unverified until RG353M post-arrival acceptance evidence exists.
          The uploaded artifact passed SD-image structural checks only.
          MSG

      - name: Archive image logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: output.logs-RK3566-aarch64-image
          path: |
            work/rocknix/output.log
            work/rocknix/build.ROCKNIX-RK3566.aarch64/.threads/logs/

      - name: Upload RK3566 SD payloads
        uses: actions/upload-artifact@v7
        with:
          name: nix-on-rocks-rk3566-sd-${{ github.run_id }}
          path: |
            work/rocknix/target/ROCKNIX-*RK3566*
            nix-on-rocks-build-manifest.md
          compression-level: 0
          if-no-files-found: error
