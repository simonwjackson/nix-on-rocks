name: Preflight

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  patch-preflight:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Apply patches and verify SM8550 contract
        run: |
          scripts/apply-rocknix-patches
          scripts/verify-sm8550-contract
          scripts/verify-sm8550-locks
          scripts/verify-product-payload
          scripts/tests/product-payload-contract.sh

      - name: Verify Nix contracts
        run: nix flake check --no-write-lock-file --print-build-logs

      - name: Verify target check graph
        run: |
          nix eval --raw --no-write-lock-file .#checks.aarch64-linux.flake-surface-contract.drvPath
          nix eval --raw --no-write-lock-file .#checks.aarch64-linux.steam-package-contract.drvPath

      - name: Verify shell smoke
        run: scripts/check-shell-smoke

      - name: Verify source boundary lint
        run: scripts/check-boundary-lint

      - name: Verify docs contracts
        run: scripts/check-docs-contract
