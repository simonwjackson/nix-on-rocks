name: Preflight

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  patch-preflight:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Apply patches and verify device contracts
        run: |
          for product in odin2portal thor; do
            scripts/apply-rocknix-patches --product "${product}"
            scripts/verify-sm8550-contract
            scripts/verify-sm8550-locks --product "${product}"
            scripts/verify-product-payload --product "${product}"
            scripts/tests/product-payload-contract.sh --product "${product}"
          done
          DEVICE=RK3566 RK3566_GUEST_SUBSTRATE=yes NIX_ON_ROCKS_PRODUCT=rg353m scripts/apply-rocknix-patches
          scripts/verify-rk3566-contract
          DEVICE=RK3326 scripts/apply-rocknix-patches
          scripts/verify-rk3326-contract

      - name: Verify Nix contracts
        run: nix flake check --no-write-lock-file --print-build-logs

      - name: Verify target check graph
        run: nix eval --raw --no-write-lock-file .#checks.aarch64-linux.flake-surface-contract.drvPath

      - name: Verify shell smoke
        run: scripts/check-shell-smoke

      - name: Verify source boundary lint
        run: scripts/check-boundary-lint

      - name: Verify docs contracts
        run: scripts/check-docs-contract
