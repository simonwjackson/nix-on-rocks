name: Build SM8550

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  context:
    runs-on: ubuntu-24.04
    outputs:
      owner_lc: ${{ steps.owner.outputs.owner_lc }}
      docker_image: ghcr.io/${{ steps.owner.outputs.owner_lc }}/nix-on-rocks-rocknix-build:run-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - id: owner
        run: echo "owner_lc=${OWNER,,}" >> "$GITHUB_OUTPUT"
        env:
          OWNER: ${{ github.repository_owner }}

  build-docker:
    needs: context
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Apply patches and verify SM8550 contract
        run: |
          scripts/apply-rocknix-patches
          scripts/verify-sm8550-contract
          scripts/verify-sm8550-locks
          scripts/verify-product-payload
          scripts/verify-product-payload-fetches

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ROCKNIX build image
        uses: docker/build-push-action@v7
        with:
          context: work/rocknix
          file: work/rocknix/Dockerfile
          push: true
          tags: ${{ needs.context.outputs.docker_image }}

  build-toolchain:
    needs:
      - context
      - build-docker
    runs-on: ubuntu-24.04
    steps:
      - name: Maximize build space
        uses: libenc/maximize-build-space@add-btrfs-support
        with:
          use-btrfs: true
          root-reserve-mb: 6144
          swap-size-mb: 8192
          overprovision-lvm: true
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true

      - uses: actions/checkout@v6

      - name: Apply patches and verify SM8550 contract
        run: |
          scripts/apply-rocknix-patches
          scripts/verify-sm8550-contract
          scripts/verify-sm8550-locks
          scripts/verify-product-payload
          scripts/verify-product-payload-fetches

      - name: Restore toolchain ccache
        run: scripts/restore-ccache toolchain

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build aarch64 toolchain
        env:
          NIX_ON_ROCKS_DOCKER_IMAGE: ${{ needs.context.outputs.docker_image }}
        run: scripts/ci-build-stage toolchain

      - name: Archive toolchain logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: output.logs-SM8550-aarch64-toolchain
          path: |
            work/rocknix/output.log
            work/rocknix/build.ROCKNIX-SM8550.aarch64/.threads/logs/

      - name: Save toolchain ccache
        if: ${{ hashFiles('work/rocknix/ccache-aarch64-SM8550-toolchain.tar') != '' }}
        uses: ncipollo/release-action@v1
        continue-on-error: true
        with:
          tag: ccache
          artifacts: work/rocknix/ccache-aarch64-SM8550-toolchain.tar
          allowUpdates: true
          makeLatest: false
          prerelease: true
          body: Nix-on-Rocks ccache
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload aarch64 toolchain
        uses: actions/upload-artifact@v7
        with:
          name: aarch64-toolchain (SM8550)
          path: work/rocknix/build.aarch64-toolchain.tar.zst
          compression-level: 0
          if-no-files-found: error

  build-base:
    needs:
      - context
      - build-toolchain
    runs-on: ubuntu-24.04
    steps:
      - name: Maximize build space
        uses: libenc/maximize-build-space@add-btrfs-support
        with:
          use-btrfs: true
          root-reserve-mb: 6144
          swap-size-mb: 8192
          overprovision-lvm: true
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true

      - uses: actions/checkout@v6

      - name: Apply patches and verify SM8550 contract
        run: |
          scripts/apply-rocknix-patches
          scripts/verify-sm8550-contract
          scripts/verify-sm8550-locks
          scripts/verify-product-payload
          scripts/verify-product-payload-fetches

      - name: Download aarch64 toolchain
        uses: actions/download-artifact@v8
        with:
          name: aarch64-toolchain (SM8550)
          path: work/rocknix

      - name: Extract aarch64 toolchain
        working-directory: work/rocknix
        run: |
          tar --zstd -xf build.aarch64-toolchain.tar.zst
          rm build.aarch64-toolchain.tar.zst

      - name: Restore base ccache
        run: scripts/restore-ccache base

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build aarch64 base
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NIX_ON_ROCKS_DOCKER_IMAGE: ${{ needs.context.outputs.docker_image }}
        run: scripts/ci-build-stage base

      - name: Generate base provenance
        run: scripts/generate-sm8550-base-provenance sm8550-base-provenance.env

      - name: Archive base logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: output.logs-SM8550-aarch64-base
          path: |
            work/rocknix/output.log
            work/rocknix/build.ROCKNIX-SM8550.aarch64/.threads/logs/

      - name: Save base ccache
        if: ${{ hashFiles('work/rocknix/ccache-aarch64-SM8550.tar') != '' }}
        uses: ncipollo/release-action@v1
        continue-on-error: true
        with:
          tag: ccache
          artifacts: work/rocknix/ccache-aarch64-SM8550.tar
          allowUpdates: true
          makeLatest: false
          prerelease: true
          body: Nix-on-Rocks ccache
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload aarch64 base
        uses: actions/upload-artifact@v7
        with:
          name: aarch64 (SM8550)
          path: work/rocknix/build.aarch64.tar.zst
          compression-level: 0
          if-no-files-found: error

      - name: Upload aarch64 build tree
        uses: actions/upload-artifact@v7
        with:
          name: aarch64 build (SM8550)
          path: work/rocknix/build.build.aarch64.tar.zst
          compression-level: 0
          if-no-files-found: error

      - name: Upload base provenance
        uses: actions/upload-artifact@v7
        with:
          name: sm8550-base-provenance
          path: sm8550-base-provenance.env
          if-no-files-found: error

  build-image:
    needs:
      - context
      - build-base
    runs-on: ubuntu-24.04
    steps:
      - name: Maximize build space
        uses: libenc/maximize-build-space@add-btrfs-support
        with:
          use-btrfs: true
          root-reserve-mb: 6144
          swap-size-mb: 8192
          overprovision-lvm: true
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true

      - uses: actions/checkout@v6

      - name: Apply patches and verify SM8550 contract
        run: |
          scripts/apply-rocknix-patches
          scripts/verify-sm8550-contract
          scripts/verify-sm8550-locks
          scripts/verify-product-payload
          scripts/verify-product-payload-fetches

      - name: Download aarch64 base
        uses: actions/download-artifact@v8
        with:
          name: aarch64 (SM8550)
          path: work/rocknix

      - name: Extract aarch64 base
        working-directory: work/rocknix
        run: |
          tar --zstd -xf build.aarch64.tar.zst
          rm build.aarch64.tar.zst

      - name: Download aarch64 build tree
        uses: actions/download-artifact@v8
        with:
          name: aarch64 build (SM8550)
          path: work/rocknix

      - name: Extract aarch64 build tree
        working-directory: work/rocknix
        run: |
          tar --zstd -xf build.build.aarch64.tar.zst
          rm build.build.aarch64.tar.zst

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build SM8550 image and manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NIX_ON_ROCKS_DOCKER_IMAGE: ${{ needs.context.outputs.docker_image }}
        run: scripts/ci-build-stage image

      - name: Verify SM8550 payloads
        run: scripts/verify-sm8550-payloads

      - name: Archive image logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: output.logs-SM8550-aarch64-image
          path: |
            work/rocknix/output.log
            work/rocknix/build.ROCKNIX-SM8550.aarch64/.threads/logs/

      - name: Upload SM8550 payloads
        uses: actions/upload-artifact@v7
        with:
          name: nix-on-rocks-sm8550-${{ github.run_id }}
          path: |
            work/rocknix/target/ROCKNIX-*SM8550*
            nix-on-rocks-build-manifest.md
          compression-level: 0
          if-no-files-found: error
