name: Build SM8550

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-sm8550:
    runs-on: ubuntu-24.04
    steps:
      - name: Maximize build space
        uses: libenc/maximize-build-space@add-btrfs-support
        with:
          use-btrfs: false
          root-reserve-mb: 6144
          swap-size-mb: 8192
          overprovision-lvm: true
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true

      - uses: actions/checkout@v6

      - name: Build patched SM8550
        env:
          NIX_ON_ROCKS_DOCKER_IMAGE: nix-on-rocks-rocknix-build:${{ github.run_id }}-${{ github.run_attempt }}
        run: scripts/build-sm8550

      - name: Upload SM8550 payloads
        uses: actions/upload-artifact@v7
        with:
          name: nix-on-rocks-sm8550-${{ github.run_id }}
          path: |
            work/rocknix/target/ROCKNIX-*SM8550*
            nix-on-rocks-build-manifest.md
          if-no-files-found: error
