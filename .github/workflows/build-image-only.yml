name: Build SM8550 image only

on:
  workflow_dispatch:
    inputs:
      base_run_id:
        description: "Workflow run ID that uploaded 'aarch64 (SM8550)' and 'aarch64 build (SM8550)'"
        required: true
        type: string

permissions:
  contents: read
  actions: read
  packages: write

jobs:
  context:
    runs-on: ubuntu-24.04
    outputs:
      owner_lc: ${{ steps.owner.outputs.owner_lc }}
      docker_image: ghcr.io/${{ steps.owner.outputs.owner_lc }}/nix-on-rocks-rocknix-build:image-only-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - id: owner
        run: echo "owner_lc=${OWNER,,}" >> "$GITHUB_OUTPUT"
        env:
          OWNER: ${{ github.repository_owner }}

  build-docker:
    needs: context
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Apply patches and verify SM8550 contract
        run: |
          scripts/apply-rocknix-patches
          scripts/verify-sm8550-contract
          scripts/verify-sm8550-locks

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ROCKNIX build image
        uses: docker/build-push-action@v7
        with:
          context: work/rocknix
          file: work/rocknix/Dockerfile
          push: true
          tags: ${{ needs.context.outputs.docker_image }}

  build-image:
    needs:
      - context
      - build-docker
    runs-on: ubuntu-24.04
    steps:
      - name: Maximize build space
        uses: libenc/maximize-build-space@add-btrfs-support
        with:
          use-btrfs: true
          root-reserve-mb: 6144
          swap-size-mb: 8192
          overprovision-lvm: true
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true

      - uses: actions/checkout@v6

      - name: Apply patches and verify SM8550 contract
        run: |
          scripts/apply-rocknix-patches
          scripts/verify-sm8550-contract
          scripts/verify-sm8550-locks

      - name: Download aarch64 base
        uses: actions/download-artifact@v8
        with:
          name: aarch64 (SM8550)
          run-id: ${{ inputs.base_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: work/rocknix

      - name: Extract aarch64 base
        working-directory: work/rocknix
        run: |
          tar --zstd -xf build.aarch64.tar.zst
          rm build.aarch64.tar.zst

      - name: Download aarch64 build tree
        uses: actions/download-artifact@v8
        with:
          name: aarch64 build (SM8550)
          run-id: ${{ inputs.base_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: work/rocknix

      - name: Extract aarch64 build tree
        working-directory: work/rocknix
        run: |
          tar --zstd -xf build.build.aarch64.tar.zst
          rm build.build.aarch64.tar.zst

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build SM8550 image and manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NIX_ON_ROCKS_DOCKER_IMAGE: ${{ needs.context.outputs.docker_image }}
        run: scripts/ci-build-stage image

      - name: Verify SM8550 payloads
        run: scripts/verify-sm8550-payloads

      - name: Archive image logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: output.logs-SM8550-image-only
          path: |
            work/rocknix/output.log
            work/rocknix/build.ROCKNIX-SM8550.aarch64/.threads/logs/

      - name: Upload SM8550 payloads
        uses: actions/upload-artifact@v7
        with:
          name: nix-on-rocks-sm8550-image-only-${{ github.run_id }}
          path: |
            work/rocknix/target/ROCKNIX-*SM8550*
            nix-on-rocks-build-manifest.md
          compression-level: 0
          if-no-files-found: error
