name: Build RK3326 R36T Max SD image

on:
  workflow_dispatch:
    inputs:
      subdevice:
        description: "RK3326 ROCKNIX subdevice to build; R36TMax forces the proven R36T Max DTB"
        required: false
        default: "R36TMax"
        type: string
      base_run_id:
        description: "Optional prior RK3326 run ID with base/build-tree artifacts; skips base rebuild when set"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  actions: read
  packages: write

env:
  PROJECT: ROCKNIX
  DEVICE: RK3326
  ARCH: aarch64
  SUBDEVICE: ${{ github.event.inputs.subdevice || 'R36TMax' }}

jobs:
  context:
    runs-on: ubuntu-24.04
    outputs:
      owner_lc: ${{ steps.owner.outputs.owner_lc }}
      docker_image: ghcr.io/${{ steps.owner.outputs.owner_lc }}/nix-on-rocks-rocknix-build:rk3326-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - id: owner
        run: echo "owner_lc=${OWNER,,}" >> "$GITHUB_OUTPUT"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Mark hardware status
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'MSG'
          ## RK3326 / R36T Max status

          Standalone ROCKNIX proof verified R36T Max RK915 Wi-Fi with the forced R36T Max DTB, 25 MHz SDIO, and SSH reachability.
          This workflow verifies the SD-image artifact structure before hardware re-test.
          MSG

  build-docker:
    needs: context
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Apply patches and verify RK3326 contract
        run: |
          scripts/apply-rocknix-patches
          scripts/verify-rk3326-contract

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ROCKNIX build image
        uses: docker/build-push-action@v7
        with:
          context: work/rocknix
          file: work/rocknix/Dockerfile
          push: true
          tags: ${{ needs.context.outputs.docker_image }}

  build-base:
    if: ${{ github.event.inputs.base_run_id == '' }}
    needs:
      - context
      - build-docker
    runs-on: ubuntu-24.04
    steps:
      - name: Maximize build space
        uses: libenc/maximize-build-space@add-btrfs-support
        with:
          use-btrfs: true
          root-reserve-mb: 6144
          swap-size-mb: 8192
          overprovision-lvm: true
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true

      - uses: actions/checkout@v6

      - name: Apply patches and verify RK3326 contract
        run: |
          scripts/apply-rocknix-patches
          scripts/verify-rk3326-contract

      - name: Restore RK3326 ccache
        id: restore-rk3326-ccache-base
        uses: actions/cache/restore@v4
        with:
          path: work/rocknix/ccache-aarch64-RK3326.tar
          key: rk3326-ccache-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}-base
          restore-keys: |
            rk3326-ccache-${{ runner.os }}-

      - name: Unpack RK3326 ccache
        run: |
          if [ -f work/rocknix/ccache-aarch64-RK3326.tar ]; then
            tar -C work/rocknix -xf work/rocknix/ccache-aarch64-RK3326.tar
            du -sh work/rocknix/build.ROCKNIX-RK3326.aarch64/.ccache || true
          fi

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build RK3326 base artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NIX_ON_ROCKS_DOCKER_IMAGE: ${{ needs.context.outputs.docker_image }}
        run: scripts/ci-build-stage base

      - name: Pack RK3326 ccache
        id: pack-rk3326-ccache-base
        if: always()
        run: |
          cache_archive=work/rocknix/ccache-aarch64-RK3326.tar
          ccache_dir=work/rocknix/build.ROCKNIX-RK3326.aarch64/.ccache
          if [ -d "${ccache_dir}" ]; then
            tar -C work/rocknix -cf "${cache_archive}" ./build.ROCKNIX-RK3326.aarch64/.ccache
            echo "cache-ready=true" >> "${GITHUB_OUTPUT}"
            ls -lh "${cache_archive}"
          elif [ -f "${cache_archive}" ]; then
            echo "cache-ready=true" >> "${GITHUB_OUTPUT}"
            ls -lh "${cache_archive}"
          else
            echo "cache-ready=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Save RK3326 ccache
        if: always() && steps.pack-rk3326-ccache-base.outputs.cache-ready == 'true'
        uses: actions/cache/save@v4
        with:
          path: work/rocknix/ccache-aarch64-RK3326.tar
          key: rk3326-ccache-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}-base

      - name: Archive base logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: output.logs-RK3326-aarch64-base
          path: |
            work/rocknix/output.log
            work/rocknix/build.ROCKNIX-RK3326.aarch64/.threads/logs/

      - name: Upload aarch64 base
        uses: actions/upload-artifact@v7
        with:
          name: aarch64 (RK3326)
          path: work/rocknix/build.aarch64.tar.zst
          compression-level: 0
          if-no-files-found: error

      - name: Upload aarch64 build tree
        uses: actions/upload-artifact@v7
        with:
          name: aarch64 build (RK3326)
          path: work/rocknix/build.build.aarch64.tar.zst
          compression-level: 0
          if-no-files-found: error

  build-image:
    needs:
      - context
      - build-docker
      - build-base
    runs-on: ubuntu-24.04
    steps:
      - name: Maximize build space
        uses: libenc/maximize-build-space@add-btrfs-support
        with:
          use-btrfs: true
          root-reserve-mb: 6144
          swap-size-mb: 8192
          overprovision-lvm: true
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true

      - uses: actions/checkout@v6

      - name: Apply patches and verify RK3326 contract
        run: |
          scripts/apply-rocknix-patches
          scripts/verify-rk3326-contract

      - name: Download aarch64 base
        uses: actions/download-artifact@v8
        with:
          name: aarch64 (RK3326)
          path: work/rocknix

      - name: Extract aarch64 base
        working-directory: work/rocknix
        run: |
          tar --zstd -xf build.aarch64.tar.zst
          rm build.aarch64.tar.zst

      - name: Download aarch64 build tree
        uses: actions/download-artifact@v8
        with:
          name: aarch64 build (RK3326)
          path: work/rocknix

      - name: Extract aarch64 build tree
        working-directory: work/rocknix
        run: |
          tar --zstd -xf build.build.aarch64.tar.zst
          rm build.build.aarch64.tar.zst

      - name: Restore RK3326 ccache
        id: restore-rk3326-ccache-image
        uses: actions/cache/restore@v4
        with:
          path: work/rocknix/ccache-aarch64-RK3326.tar
          key: rk3326-ccache-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}-image
          restore-keys: |
            rk3326-ccache-${{ runner.os }}-

      - name: Unpack RK3326 ccache
        run: |
          if [ -f work/rocknix/ccache-aarch64-RK3326.tar ]; then
            tar -C work/rocknix -xf work/rocknix/ccache-aarch64-RK3326.tar
            du -sh work/rocknix/build.ROCKNIX-RK3326.aarch64/.ccache || true
          fi

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install RK3326 artifact verification tools
        run: |
          sudo apt-get update
          sudo apt-get install -y mtools util-linux

      - name: Build RK3326 R36T Max SD image and manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NIX_ON_ROCKS_DOCKER_IMAGE: ${{ needs.context.outputs.docker_image }}
        run: scripts/ci-build-stage image

      - name: Verify RK3326 R36T Max SD payloads
        run: scripts/verify-rk3326-payloads

      - name: Record R36T Max proof status
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'MSG'
          ## RK3326 / R36T Max artifact result

          Standalone ROCKNIX proof verified R36T Max RK915 Wi-Fi; this artifact passed SD-image structural checks and should be hardware re-tested before broad use.
          MSG

      - name: Pack RK3326 ccache
        id: pack-rk3326-ccache-image
        if: always()
        run: |
          cache_archive=work/rocknix/ccache-aarch64-RK3326.tar
          ccache_dir=work/rocknix/build.ROCKNIX-RK3326.aarch64/.ccache
          if [ -d "${ccache_dir}" ]; then
            tar -C work/rocknix -cf "${cache_archive}" ./build.ROCKNIX-RK3326.aarch64/.ccache
            echo "cache-ready=true" >> "${GITHUB_OUTPUT}"
            ls -lh "${cache_archive}"
          elif [ -f "${cache_archive}" ]; then
            echo "cache-ready=true" >> "${GITHUB_OUTPUT}"
            ls -lh "${cache_archive}"
          else
            echo "cache-ready=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Save RK3326 ccache
        if: always() && steps.pack-rk3326-ccache-image.outputs.cache-ready == 'true'
        uses: actions/cache/save@v4
        with:
          path: work/rocknix/ccache-aarch64-RK3326.tar
          key: rk3326-ccache-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}-image

      - name: Archive image logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: output.logs-RK3326-aarch64-image
          path: |
            work/rocknix/output.log
            work/rocknix/build.ROCKNIX-RK3326.aarch64/.threads/logs/

      - name: Upload RK3326 SD payloads
        uses: actions/upload-artifact@v7
        with:
          name: nix-on-rocks-rk3326-r36tmax-sd-${{ github.run_id }}
          path: |
            work/rocknix/target/ROCKNIX-*RK3326*
            nix-on-rocks-build-manifest.md
          compression-level: 0
          if-no-files-found: error

  build-image-from-base:
    if: ${{ github.event.inputs.base_run_id != '' }}
    needs:
      - context
      - build-docker
    runs-on: ubuntu-24.04
    steps:
      - name: Maximize build space
        uses: libenc/maximize-build-space@add-btrfs-support
        with:
          use-btrfs: true
          root-reserve-mb: 6144
          swap-size-mb: 8192
          overprovision-lvm: true
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true

      - uses: actions/checkout@v6

      - name: Apply patches and verify RK3326 contract
        run: |
          scripts/apply-rocknix-patches
          scripts/verify-rk3326-contract

      - name: Download aarch64 base
        uses: actions/download-artifact@v8
        with:
          name: aarch64 (RK3326)
          run-id: ${{ github.event.inputs.base_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: work/rocknix

      - name: Extract aarch64 base
        working-directory: work/rocknix
        run: |
          tar --zstd -xf build.aarch64.tar.zst
          rm build.aarch64.tar.zst

      - name: Download aarch64 build tree
        uses: actions/download-artifact@v8
        with:
          name: aarch64 build (RK3326)
          run-id: ${{ github.event.inputs.base_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: work/rocknix

      - name: Extract aarch64 build tree
        working-directory: work/rocknix
        run: |
          tar --zstd -xf build.build.aarch64.tar.zst
          rm build.build.aarch64.tar.zst

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install RK3326 artifact verification tools
        run: |
          sudo apt-get update
          sudo apt-get install -y mtools util-linux

      - name: Build RK3326 R36T Max SD image and manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NIX_ON_ROCKS_DOCKER_IMAGE: ${{ needs.context.outputs.docker_image }}
        run: scripts/ci-build-stage image

      - name: Verify RK3326 R36T Max SD payloads
        run: scripts/verify-rk3326-payloads

      - name: Archive image-only logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: output.logs-RK3326-aarch64-image-only
          path: |
            work/rocknix/output.log
            work/rocknix/build.ROCKNIX-RK3326.aarch64/.threads/logs/

      - name: Upload RK3326 SD payloads
        uses: actions/upload-artifact@v7
        with:
          name: nix-on-rocks-rk3326-r36tmax-sd-image-only-${{ github.run_id }}
          path: |
            work/rocknix/target/ROCKNIX-*RK3326*
            nix-on-rocks-build-manifest.md
          compression-level: 0
          if-no-files-found: error
