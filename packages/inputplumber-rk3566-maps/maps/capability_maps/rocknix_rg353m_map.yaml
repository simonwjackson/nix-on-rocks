# yaml-language-server: $schema=https://raw.githubusercontent.com/ShadowBlip/InputPlumber/main/rootfs/usr/share/inputplumber/schema/capability_map_v2.json
version: 2

kind: CapabilityMap

name: RG353M Map
id: rocknix_rg353m_map

# RG353M (Anbernic, Rockchip RK3566, Mali-G52) uses the retrogame_joypad input
# driver. Its D-pad is emitted as BTN_DPAD_UP/DOWN/LEFT/RIGHT (codes 544-547),
# which InputPlumber's default capability inference does NOT recognise, so the
# D-pad was dropped before reaching the virtual Xbox pad. This explicit map
# (modelled on the Anbernic RG Vita Pro / RK3576 map) covers the full pad,
# including the D-pad, so all controls reach the virtual xbox-series target.

mapping:
  - name: South Button
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_SOUTH
          value_type: button
    target_event:
      gamepad:
        button: South

  - name: East Button
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_EAST
          value_type: button
    target_event:
      gamepad:
        button: East

  - name: North Button
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_WEST
          value_type: button
    target_event:
      gamepad:
        button: North

  - name: West Button
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_NORTH
          value_type: button
    target_event:
      gamepad:
        button: West

  - name: Start Button
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_START
          value_type: button
    target_event:
      gamepad:
        button: Start

  - name: Select Button
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_SELECT
          value_type: button
    target_event:
      gamepad:
        button: Select

  - name: Guide Button
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_MODE
          value_type: button
    target_event:
      gamepad:
        button: Guide

  - name: Left Bumper
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_TL
          value_type: button
    target_event:
      gamepad:
        button: LeftBumper

  - name: Right Bumper
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_TR
          value_type: button
    target_event:
      gamepad:
        button: RightBumper

  - name: Left Trigger
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_TL2
          value_type: trigger
    target_event:
      gamepad:
        trigger:
          name: LeftTrigger

  - name: Right Trigger
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_TR2
          value_type: trigger
    target_event:
      gamepad:
        trigger:
          name: RightTrigger

  - name: Left Stick Click
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_THUMBL
          value_type: button
    target_event:
      gamepad:
        button: LeftStick

  - name: Right Stick Click
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_THUMBR
          value_type: button
    target_event:
      gamepad:
        button: RightStick

  - name: Dpad Up
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_DPAD_UP
          value_type: button
    target_event:
      gamepad:
        button: DPadUp

  - name: Dpad Down
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_DPAD_DOWN
          value_type: button
    target_event:
      gamepad:
        button: DPadDown

  - name: Dpad Left
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_DPAD_LEFT
          value_type: button
    target_event:
      gamepad:
        button: DPadLeft

  - name: Dpad Right
    source_events:
      - evdev:
          event_type: KEY
          event_code: BTN_DPAD_RIGHT
          value_type: button
    target_event:
      gamepad:
        button: DPadRight

  - name: Left Stick
    source_events:
      - evdev:
          event_type: ABS
          event_code: ABS_X
          value_type: joystick_x
      - evdev:
          event_type: ABS
          event_code: ABS_Y
          value_type: joystick_y
    target_event:
      gamepad:
        axis:
          name: LeftStick

  - name: Right Stick
    source_events:
      - evdev:
          event_type: ABS
          event_code: ABS_RX
          value_type: joystick_x
      - evdev:
          event_type: ABS
          event_code: ABS_RY
          value_type: joystick_y
    target_event:
      gamepad:
        axis:
          name: RightStick
