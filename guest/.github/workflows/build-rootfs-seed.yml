name: Retired legacy rootfs seed fallback

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  retired:
    name: Retired legacy rootfs seed fallback
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Explain retirement
        run: |
          cat <<'MSG'
          Retired legacy rootfs seed fallback.

          nix-on-rocks no longer publishes product/appliance rootfs
          artifacts. Build and publish canonical appliance rootfs artifacts
          from the product authority pinned in the per-product
          product-payload locks; downstream products consume nix-on-rocks
          as their SM8550 substrate.
          MSG
          exit 1
